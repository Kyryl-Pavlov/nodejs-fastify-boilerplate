name: Deploy Wiki

on:
  push:
    branches:
      - main
    paths:
      - "wiki/**"
      - ".github/workflows/deploy-wiki.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-wiki:
    name: Sync wiki/ to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: source

      - name: Checkout or initialize wiki repo
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki \
            || (mkdir wiki && git -C wiki init -b master)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync pages
        run: rsync -a --delete --exclude=".git" source/wiki/ wiki/

      - name: Commit and push
        working-directory: wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote remove origin 2>/dev/null || true
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          git add -A
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git commit -m "docs: sync wiki from ${GITHUB_SHA}"
          git push origin HEAD:master
